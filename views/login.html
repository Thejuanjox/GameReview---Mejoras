<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Administracion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card bg-secondary bg-opacity-25 border-secondary p-4 shadow" style="width: 100%; max-width: 400px;">
    <h3 class="text-center text-white mb-4">Acceso Admin</h3>
    
    <div id="error-msg" class="alert alert-danger d-none text-center"></div>

    <form id="login-form">
        <div class="mb-3">
            <label class="form-label text-light">Usuario:</label>
            <input type="text" id="username" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-light">Contraseña:</label>
            <input type="password" id="password" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Ingresar</button>
        <a href="/" class="btn btn-dark border-secondary w-100">Volver al inicio</a>
    </form>
</div>

<script src="/js/login.js"></script>
</body>
</html>
